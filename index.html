<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f8fafc" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="주간 스케줄" />
    <title>다원 · 세찬 스케줄</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Schedule</p>
          <h1 id="heroTitle">다원 스케줄</h1>
          <p class="today-text" id="todayText"></p>
        </div>
        <a class="pdf-link" href="assets/schedule_paper.pdf" target="_blank" rel="noreferrer">원본 PDF</a>
      </header>

      <section class="profile-panel" aria-label="사람 선택">
        <button class="profile-card is-active" type="button" data-person="dawon">
          <span class="avatar dawon">다</span>
          <span>
            <strong>다원</strong>
            <small id="dawonToday">오늘 0개</small>
          </span>
        </button>
        <button class="profile-card" type="button" data-person="sechan">
          <span class="avatar sechan">세</span>
          <span>
            <strong>세찬</strong>
            <small id="sechanToday">오늘 0개</small>
          </span>
        </button>
      </section>

      <section class="filters" aria-label="스케줄 보기 설정">
        <div class="control-row">
          <label>
            <span>표</span>
            <select id="versionSelect"></select>
          </label>
          <label id="dayField">
            <span>요일</span>
            <select id="daySelect"></select>
          </label>
          <button class="week-toggle" id="weekToggle" type="button">주간 보기</button>
        </div>
      </section>

      <section class="summary" aria-label="요약">
        <div>
          <strong id="summaryCount">0</strong>
          <span id="summaryCountLabel">오늘 일정</span>
        </div>
        <div>
          <strong id="summaryNext">-</strong>
          <span>다음 일정</span>
        </div>
      </section>

      <section class="content" id="content" aria-live="polite"></section>
    </main>

    <script src="app.js" type="module"></script>
  </body>
</html>
