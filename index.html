<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f8fafc" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="주간 스케줄" />
    <title>다원 · 세찬 주간 스케줄</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Weekly Schedule</p>
          <h1>다원 · 세찬</h1>
        </div>
        <a class="pdf-link" href="assets/schedule_paper.pdf" target="_blank" rel="noreferrer">PDF</a>
      </header>

      <section class="control-panel" aria-label="스케줄 보기 설정">
        <div class="segmented" role="tablist" aria-label="사람 선택">
          <button class="segment is-active" type="button" data-mode="dawon" role="tab" aria-selected="true">다원</button>
          <button class="segment" type="button" data-mode="sechan" role="tab" aria-selected="false">세찬</button>
          <button class="segment" type="button" data-mode="all" role="tab" aria-selected="false">전체</button>
        </div>

        <div class="page-controls" aria-label="페이지 이동">
          <button class="icon-button" type="button" id="prevPage" aria-label="이전 페이지">‹</button>
          <span class="page-label"><strong id="pageNumber">1</strong><span id="pageTotal">/ 4</span></span>
          <button class="icon-button" type="button" id="nextPage" aria-label="다음 페이지">›</button>
        </div>
      </section>

      <section class="viewer-section" aria-label="스케줄 문서">
        <div class="viewer-toolbar">
          <span id="viewTitle">다원 스케줄</span>
          <span id="renderStatus">불러오는 중</span>
        </div>
        <div class="canvas-wrap" id="canvasWrap">
          <canvas id="scheduleCanvas" aria-label="주간 스케줄 PDF 보기"></canvas>
        </div>
      </section>
    </main>

    <script src="app.js" type="module"></script>
  </body>
</html>
