<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f8fafc" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="주간 스케줄" />
    <title>다원 · 세찬 스케줄</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Schedule</p>
          <h1>다원 · 세찬</h1>
        </div>
        <a class="pdf-link" href="assets/schedule_paper.pdf" target="_blank" rel="noreferrer">원본 PDF</a>
      </header>

      <section class="filters" aria-label="스케줄 필터">
        <div class="segmented" role="tablist" aria-label="보기 선택">
          <button class="segment is-active" type="button" data-view="day">일간</button>
          <button class="segment" type="button" data-view="week">주간</button>
          <button class="segment" type="button" data-view="month">월간</button>
        </div>

        <div class="field-row">
          <label>
            <span>사람</span>
            <select id="personSelect">
              <option value="all">전체</option>
              <option value="dawon">다원</option>
              <option value="sechan">세찬</option>
            </select>
          </label>
          <label>
            <span>표</span>
            <select id="versionSelect"></select>
          </label>
        </div>

        <div class="field-row">
          <label id="dayField">
            <span>요일</span>
            <select id="daySelect"></select>
          </label>
          <label id="monthField">
            <span>월</span>
            <input id="monthSelect" type="month" />
          </label>
        </div>
      </section>

      <section class="summary" aria-label="요약">
        <div>
          <strong id="summaryCount">0</strong>
          <span>개 일정</span>
        </div>
        <div>
          <strong id="summaryNext">-</strong>
          <span>다음 일정</span>
        </div>
      </section>

      <section class="content" id="content" aria-live="polite"></section>
    </main>

    <script src="app.js" type="module"></script>
  </body>
</html>
