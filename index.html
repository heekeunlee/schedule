<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f8fafc" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="주간 스케줄" />
    <title>다원 · 세찬 스케줄</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Schedule</p>
          <div class="title-row">
            <h1>오늘의 스케줄</h1>
            <button class="week-toggle" id="weekToggle" type="button">주간</button>
          </div>
          <p class="today-text" id="todayText"></p>
        </div>
        <a class="pdf-link" href="assets/schedule_paper.pdf" target="_blank" rel="noreferrer">원본 PDF</a>
      </header>

      <section class="profile-panel" aria-label="사람 선택">
        <button class="profile-card is-active" type="button" data-person="dawon">
          <span class="avatar dawon">다</span>
          <span>
            <strong>다원</strong>
            <small id="dawonToday">오늘 0개</small>
          </span>
        </button>
        <button class="profile-card" type="button" data-person="sechan">
          <span class="avatar sechan">세</span>
          <span>
            <strong>세찬</strong>
            <small id="sechanToday">오늘 0개</small>
          </span>
        </button>
      </section>

      <section class="status-panel" aria-label="일정 상태">
        <article>
          <span>현재일정</span>
          <strong id="currentStatus">진행중 없음</strong>
        </article>
        <article>
          <span>다음 일정알림</span>
          <strong id="nextStatus">-</strong>
        </article>
      </section>

      <section class="content" id="content" aria-live="polite"></section>
    </main>

    <script src="app.js" type="module"></script>
  </body>
</html>
